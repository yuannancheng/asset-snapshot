name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "${{ github.ref_name }}" | head -1)
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"[%h](https://github.com/${REPO}/commit/%H) %s by @%an" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"[%h](https://github.com/${REPO}/commit/%H) %s by @%an" --no-merges "${PREV_TAG}..HEAD")
          fi

          if [ -n "$COMMITS" ]; then
            {
              echo "$COMMITS"
              if [ -n "$PREV_TAG" ]; then
                echo ""
                echo "Full Changelog: [${PREV_TAG}...${TAG}](https://github.com/${REPO}/compare/${PREV_TAG}...${TAG})"
              fi
            } > /tmp/release-notes.md
          else
            echo "Release $TAG" > /tmp/release-notes.md
          fi

      - name: Sync tauri.conf.json version from tag
        shell: bash
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$TAG_VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "资产快照 v__VERSION__"
          releaseDraft: false
          prerelease: false
          body_path: /tmp/release-notes.md
          args: --bundles ${{ matrix.bundles }}
