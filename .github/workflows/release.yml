name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-15
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            xdg-utils

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "资产快照 v__VERSION__"
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: --bundles ${{ matrix.bundles }}

  publish-updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish update.json to updater release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"

          cat > update.json << JSONEOF
          {
            "version": "$TAG_VERSION",
            "htmlUrl": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          }
          JSONEOF

          if gh release view updater --repo "${{ github.repository }}" &>/dev/null; then
            gh release upload updater update.json --clobber --repo "${{ github.repository }}"
          else
            gh release create updater update.json --title "Updater" --notes "Version info for auto-update." --repo "${{ github.repository }}"
          fi
