name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Generate release notes
        id: notes
        run: |
          NOTES_FILE="${{ runner.temp }}/release-notes.md"
          .github/scripts/gen-release-notes.sh "$NOTES_FILE"

          # Expose release notes as a step output for the tauri-action
          echo 'notes<<EOF' >> "$GITHUB_OUTPUT"
          cat "$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync tauri.conf.json version from tag
        shell: bash
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$TAG_VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "资产快照 v__VERSION__"
          releaseDraft: false
          prerelease: false
          releaseBody: ${{ steps.notes.outputs.notes }}
          args: --bundles ${{ matrix.bundles }}

  publish-updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish update.json to updater release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"

          cat > update.json << JSONEOF
          {
            "version": "$TAG_VERSION",
            "htmlUrl": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          }
          JSONEOF

          if gh release view updater --repo "${{ github.repository }}" &>/dev/null; then
            gh release upload updater update.json --clobber --repo "${{ github.repository }}"
          else
            gh release create updater update.json --title "Updater" --notes "Version info for auto-update." --repo "${{ github.repository }}"
          fi
